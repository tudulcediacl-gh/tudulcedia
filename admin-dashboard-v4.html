<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Dashboard V4 | Tu Dulce Día</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#fff8ec;color:#563820;min-height:100vh;display:grid;place-items:center;padding:24px}.card{max-width:560px;background:#fffdf8;border:1px solid #ead8bd;border-radius:24px;padding:24px;box-shadow:0 14px 34px #56382022;text-align:center}.loader{width:42px;height:42px;border:5px solid #ead8bd;border-top-color:#b8653b;border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}a{color:#8f492b;font-weight:900}
  </style>
</head>
<body>
  <main class="card">
    <div class="loader"></div>
    <h1>Cargando Dashboard V4…</h1>
    <p>Preparando WhatsApp admin seguro desde backend.</p>
  </main>
  <script>
    fetch('./admin-dashboard-v3.html', { cache: 'no-store' })
      .then(r => r.text())
      .then(html => {
        html = html.replace(/Dashboard V3/g, 'Dashboard V4');
        html = html.replace(
          'async function whatsapp(b){let node=rowNodeFromButton(b),f=b.dataset.whatsapp,t=token();if(!t)return msg("Ingresa la clave admin.","error");setRowBusy(node,"Generando WhatsApp...",b);msg(`Generando WhatsApp ${f} desde backend...`);try{let d=await jsonp("adminAbrirWhatsapp",{token:t,folio:f});if(!d.exito)throw Error(d.mensaje||"No se pudo generar WhatsApp");window.open(d.urlWhatsapp,"_blank","noopener");msg(`WhatsApp listo para ${f}.`)}catch(e){msg(e.message,"error")}finally{clearRowBusy(node,b)}}',
          'async function whatsapp(b){let node=rowNodeFromButton(b),f=b.dataset.whatsapp,t=token();if(!t)return msg("Ingresa la clave admin.","error");let w=window.open("about:blank","_blank","noopener");if(w){w.document.write("<title>WhatsApp</title><body style=\\"font-family:system-ui;padding:24px;background:#fff8ec;color:#563820\\"><h2>Generando WhatsApp...</h2><p>Estamos preparando el mensaje con datos seguros desde backend.</p></body>");}setRowBusy(node,"Generando WhatsApp...",b);msg(`Generando WhatsApp ${f} desde backend...`);try{let d=await jsonp("adminAbrirWhatsapp",{token:t,folio:f});if(!d.exito)throw Error(d.mensaje||"No se pudo generar WhatsApp");if(w){w.location.href=d.urlWhatsapp;}else{location.href=d.urlWhatsapp;}msg(`WhatsApp listo para ${f}.`)}catch(e){if(w)w.close();msg(e.message,"error")}finally{clearRowBusy(node,b)}}'
        );
        document.open();
        document.write(html);
        document.close();
      })
      .catch(() => { location.replace('./admin-dashboard-v3.html' + location.search); });
  </script>
</body>
</html>
