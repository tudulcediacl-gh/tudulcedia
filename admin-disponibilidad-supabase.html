<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Disponibilidad Supabase</title><style>body{font-family:system-ui;margin:0;background:#fff8ec;color:#563820}.wrap{width:min(760px,calc(100% - 24px));margin:auto;padding:24px}.card{background:#fffdf8;border:1px solid #ead8bd;border-radius:22px;padding:18px;margin:12px 0;box-shadow:0 12px 28px #56382022}input,select,textarea{width:100%;padding:10px;border:1px solid #dec6a3;border-radius:12px;background:#fffdf8;font:inherit}label{display:block;margin:10px 0;font-weight:800}button,a{border:0;border-radius:999px;padding:10px 14px;font-weight:900;text-decoration:none;display:inline-block}.primary{background:#b8653b;color:white}.link{background:#f1dfc8;color:#563820}.msg{padding:12px;border-radius:14px;background:#eaf7ed;color:#48663f;font-weight:900}.err{background:#fff0ed;color:#9f3d31}</style></head><body><main class="wrap"><section class="card"><h1>Disponibilidad avanzada</h1><p>Administra fechas abiertas, cerradas, bloqueadas y cupo máximo.</p><a class="link" href="panel-td-privado-2026.html">Panel</a> <a class="link" href="admin-backoffice-supabase.html">Backoffice</a></section><section class="card"><label>Clave interna<input id="pin" type="password"></label><label>Fecha<input id="fecha" type="date"></label><label>Estado<select id="estado"><option>Abierto</option><option>Cerrado</option><option>Bloqueado</option></select></label><label>Cupo máximo<input id="cupo" type="number" placeholder="opcional"></label><label>Nota<textarea id="nota"></textarea></label><button class="primary" onclick="guardar()">Guardar disponibilidad</button><div id="msg" class="msg" style="margin-top:12px">Listo para guardar.</div></section></main><script>const U='https://uhwaybppsyibiwvqyglr.supabase.co';let K='';const $=id=>document.getElementById(id);$('pin').value=sessionStorage.td_supabase_admin_token||'';function msg(t,e){$('msg').textContent=t;$('msg').className='msg '+(e?'err':'')}async function key(){if(K)return K;let h=await fetch('supabase-catalogo-test.html?v='+Date.now()).then(r=>r.text());let m=h.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)['"]/);if(!m)throw Error('No se pudo cargar clave pública');K=m[1];return K}async function rpc(fn,p){let k=await key();let r=await fetch(U+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:k,Authorization:'Bearer '+k,'Content-Type':'application/json'},body:JSON.stringify(p)});let t=await r.text();if(!r.ok)throw Error(t);return t?JSON.parse(t):null}async function guardar(){try{sessionStorage.td_supabase_admin_token=$('pin').value;await rpc('admin_upsert_disponibilidad',{p_token:$('pin').value,p_fecha:$('fecha').value,p_estado:$('estado').value,p_cupo_maximo:$('cupo').value?+$('cupo').value:null,p_nota:$('nota').value});msg('Disponibilidad guardada correctamente.')}catch(e){msg(e.message,true)}}</script></body></html>
