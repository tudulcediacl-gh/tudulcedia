<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Admin catálogo Supabase</title><style>body{margin:0;background:#fff8ec;color:#563820;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.wrap{width:min(1200px,calc(100% - 24px));margin:auto;padding:22px 0}.card{background:#fffdf8;border:1px solid #ead8bd;border-radius:22px;padding:16px;margin:12px 0;box-shadow:0 14px 34px #56382022}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}a,button{border:0;border-radius:999px;padding:9px 12px;text-decoration:none;font-weight:900;cursor:pointer}.primary{background:#b8653b;color:white}.secondary{background:#f1dfc8;color:#563820}.ok{background:#48663f;color:white}.off{background:#fde7e2;color:#9f3d31}input,textarea{width:100%;border:1px solid #dec6a3;border-radius:12px;padding:8px;background:#fffdf8;color:#563820;font:inherit;font-weight:700}textarea{min-height:48px}.scroll{overflow:auto;border:1px solid #ead8bd;border-radius:16px}table{width:100%;border-collapse:collapse;min-width:950px}th,td{border-bottom:1px solid #ead8bd;padding:8px;text-align:left;font-size:.85rem;vertical-align:top}th{background:#f4dfc4}.msg{border-radius:14px;padding:12px;font-weight:900}.good{background:#eaf7ed;color:#48663f}.err{background:#fff0ed;color:#9f3d31}</style></head><body><main class="wrap"><section class="card top"><div><h1>Admin catálogo Supabase</h1><p>Edición de productos activos e inactivos.</p></div><div><a class="secondary" href="panel-td-privado-2026.html">Panel</a> <a class="secondary" href="./">Ver catálogo</a> <button class="primary" id="reload">Refrescar</button></div></section><section class="card"><input id="pin" type="password" placeholder="Clave interna"><button class="ok" id="savePin">Guardar clave</button></section><section class="card"><div id="msg" class="msg good">Cargando...</div><div class="scroll" style="margin-top:12px"><table><thead><tr><th>Código</th><th>Nombre</th><th>Categoría</th><th>Precio</th><th>Orden</th><th>Activo</th><th>Descripción</th><th></th></tr></thead><tbody id="body"></tbody></table></div></section></main><script>const U='https://uhwaybppsyibiwvqyglr.supabase.co';let K='',R=[];const $=s=>document.querySelector(s);function h(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function m(t,b){$('#msg').className='msg '+(b?'err':'good');$('#msg').textContent=t}async function key(){if(K)return K;let x=await fetch('supabase-catalogo-test.html?v='+Date.now()).then(r=>r.text()),z=x.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)['"]/);if(!z)throw Error('No se pudo iniciar');K=z[1];return K}async function api(p,o={}){let k=await key(),r=await fetch(U+p,{...o,headers:{apikey:k,Authorization:'Bearer '+k,'Content-Type':'application/json'}}),t=await r.text(),j=null;try{j=t?JSON.parse(t):null}catch(e){j=t}if(!r.ok)throw Error((j&&j.message)||t||'Error');return j}async function load(){try{let p=$('#pin').value.trim();if(!p)throw Error('Ingresa clave para ver activos e inactivos');m('Cargando productos...');R=await api('/rest/v1/rpc/admin_listar_productos',{method:'POST',body:JSON.stringify({p_token:p})});render();m('OK: '+R.length+' productos.')}catch(e){m(e.message,true)}}function render(){body.innerHTML=R.map(x=>`<tr data-c="${h(x.codigo)}"><td><b>${h(x.codigo)}</b></td><td><input data-f="nombre" value="${h(x.nombre)}"></td><td>${h(x.categoria)}</td><td><input data-f="precio" type="number" value="${h(x.precio)}"></td><td><input data-f="orden" type="number" value="${h(x.orden)}"></td><td><button data-a class="${x.activo?'ok':'off'}">${x.activo?'Activo':'Inactivo'}</button></td><td><textarea data-f="descripcion">${h(x.descripcion||'')}</textarea></td><td><button data-s class="primary">Guardar</button></td></tr>`).join('');document.querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{b.textContent=b.textContent==='Activo'?'Inactivo':'Activo';b.className=b.textContent==='Activo'?'ok':'off'});document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>save(b.closest('tr')))}async function save(tr){try{let p=$('#pin').value.trim();if(!p)throw Error('Falta clave');m('Guardando '+tr.dataset.c+'...');await api('/rest/v1/rpc/admin_actualizar_producto',{method:'POST',body:JSON.stringify({p_token:p,p_codigo:tr.dataset.c,p_nombre:tr.querySelector('[data-f=nombre]').value,p_precio:Number(tr.querySelector('[data-f=precio]').value)||0,p_activo:tr.querySelector('[data-a]').textContent==='Activo',p_descripcion:tr.querySelector('[data-f=descripcion]').value,p_orden:Number(tr.querySelector('[data-f=orden]').value)||999})});m('Guardado.');await load()}catch(e){m(e.message,true)}}pin.value=sessionStorage.td_supabase_admin_token||'';savePin.onclick=()=>{sessionStorage.td_supabase_admin_token=pin.value.trim();m('Clave guardada.');load()};reload.onclick=load;if(pin.value)load();else m('Ingresa clave para cargar productos activos e inactivos.');</script></body></html>
