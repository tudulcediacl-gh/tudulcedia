<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Tu Dulce Día | Catálogo Supabase</title>
  <style>
    :root{--bg:#fff8ec;--card:#fffdf8;--ink:#563820;--muted:#7d5b3f;--line:#ead8bd;--accent:#b8653b;--green:#48663f;--shadow:#56382022}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;min-height:100vh;display:grid;place-items:center;padding:24px;line-height:1.45}
    .card{width:min(680px,100%);background:var(--card);border:1px solid var(--line);border-radius:26px;padding:28px;box-shadow:0 16px 38px var(--shadow);text-align:center}
    h1{font-size:clamp(2rem,5vw,3rem);margin:0 0 8px}
    p{margin:0;color:var(--muted);font-weight:850}
    .badge{display:inline-flex;margin:16px 0 0;background:#eaf7ed;color:#166534;border:1px solid #bfe7ca;border-radius:999px;padding:8px 12px;font-weight:1000}
    .actions{display:grid;gap:12px;margin-top:22px}
    a{border-radius:999px;padding:14px 18px;text-decoration:none;font-weight:1000;display:inline-flex;align-items:center;justify-content:center}
    .primary{background:var(--accent);color:#fff}.secondary{background:#f1dfc8;color:var(--ink)}.green{background:var(--green);color:#fff}
    @media(min-width:680px){.actions{grid-template-columns:1.25fr 1fr 1fr}}
  </style>
</head>
<body>
  <main class="card">
    <h1>Tu Dulce Día</h1>
    <p>Catálogo controlado con productos desde Supabase.</p>
    <span class="badge">Versión paralela: el catálogo principal sigue intacto</span>
    <div class="actions">
      <a class="primary" href="catalogo-supabase-form-test.html?v=20260621-2">Entrar al catálogo</a>
      <a class="secondary" href="./">Catálogo actual</a>
      <a class="green" href="panel-td-privado-2026.html">Panel privado</a>
    </div>
  </main>
</body>
</html>
