<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Reportes Supabase</title><style>body{font-family:system-ui;margin:0;background:#fff8ec;color:#563820}.wrap{width:min(850px,calc(100% - 24px));margin:auto;padding:24px}.card{background:#fffdf8;border:1px solid #ead8bd;border-radius:22px;padding:18px;margin:12px 0;box-shadow:0 12px 28px #56382022}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}input{width:100%;padding:10px;border:1px solid #dec6a3;border-radius:12px;background:#fffdf8;font:inherit}label{display:block;margin:10px 0;font-weight:800}button,a{border:0;border-radius:999px;padding:10px 14px;font-weight:900;text-decoration:none;display:inline-block}.primary{background:#b8653b;color:white}.link{background:#f1dfc8;color:#563820}.msg{padding:12px;border-radius:14px;background:#eaf7ed;color:#48663f;font-weight:900}.err{background:#fff0ed;color:#9f3d31}pre{white-space:pre-wrap;border:1px solid #ead8bd;border-radius:16px;padding:12px;background:#fffaf0}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><main class="wrap"><section class="card"><h1>Reportes Supabase</h1><p>Resumen por periodo: pedidos, ventas, compras y resultado bruto.</p><a class="link" href="panel-td-privado-2026.html">Panel</a> <a class="link" href="admin-backoffice-supabase.html">Backoffice</a></section><section class="card"><label>Clave interna<input id="pin" type="password"></label><div class="grid"><label>Desde<input id="desde" type="date"></label><label>Hasta<input id="hasta" type="date"></label></div><button class="primary" onclick="generar()">Generar reporte</button><div id="msg" class="msg" style="margin-top:12px">Listo para generar.</div><pre id="out"></pre></section></main><script>const U='https://uhwaybppsyibiwvqyglr.supabase.co';let K='';const $=id=>document.getElementById(id);$('pin').value=sessionStorage.td_supabase_admin_token||'';function msg(t,e){$('msg').textContent=t;$('msg').className='msg '+(e?'err':'')}async function key(){if(K)return K;let h=await fetch('supabase-catalogo-test.html?v='+Date.now()).then(r=>r.text());let m=h.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)['"]/);if(!m)throw Error('No se pudo cargar clave pública');K=m[1];return K}async function rpc(fn,p){let k=await key();let r=await fetch(U+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:k,Authorization:'Bearer '+k,'Content-Type':'application/json'},body:JSON.stringify(p)});let t=await r.text();if(!r.ok)throw Error(t);return t?JSON.parse(t):null}async function generar(){try{sessionStorage.td_supabase_admin_token=$('pin').value;let r=await rpc('admin_reportes_resumen',{p_token:$('pin').value,p_desde:$('desde').value||null,p_hasta:$('hasta').value||null});$('out').textContent=JSON.stringify(r,null,2);msg('Reporte generado.')}catch(e){msg(e.message,true)}}</script></body></html>
