<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tu Dulce Día | Catálogo</title>
  <meta name="description" content="Catálogo de Tu Dulce Día para pedidos de galletas artesanales y pan de masa madre.">
  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#fff8ec;color:#563820;min-height:100vh;display:grid;place-items:center;padding:24px}.card{max-width:560px;background:#fffdf8;border:1px solid #ead8bd;border-radius:24px;padding:24px;box-shadow:0 14px 34px #56382022;text-align:center}.loader{width:42px;height:42px;border:5px solid #ead8bd;border-top-color:#b8653b;border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card">
    <div class="loader"></div>
    <h1>Cargando catálogo…</h1>
    <p>Estamos preparando el catálogo actualizado de Tu Dulce Día.</p>
  </main>
  <script>
    const reemplazos = [
      [/Tu Dulcedía/g, 'Tu Dulce Día'],
      [/Tu Dulcedia/g, 'Tu Dulce Día'],
      [/Tu Dulce D[ií]a/g, 'Tu Dulce Día'],
      [/AKfycbzmPICimq95KQ4GLloWbgeoonhTWBjzUM7J7kMbz32r9qiooqzC_MY4e2IADroA8Rnl/g, 'AKfycby92UZyqaJJMNdu5jzDIvHjALOvqVG2sr1PxvLvod19v5ky9cXO4mBSjfceJ1Mh-Rg'],
      [/Quisiera confirmar disponibilidad\./g, 'Método de pago: ${document.getElementById("pay") ? document.getElementById("pay").value : "No indicado"}. Quisiera confirmar disponibilidad.'],
      [/<a class="btn secondary" href="admin-dashboard\.html">Admin<\/a>/g, ''],
      [/<a class="btn secondary" href="\.\/">Catálogo actual<\/a>/g, ''],
      [/<a class="btn green"[^>]*>Consulta por WhatsApp<\/a>/g, ''],
      [/<a id="finalWhatsapp" class="btn green big-whatsapp" target="_blank" rel="noopener">Consultar por WhatsApp<\/a>/g, '<a id="finalWhatsapp" class="btn green big-whatsapp" target="_blank" rel="noopener">Consultar por WhatsApp</a><a class="btn secondary big-whatsapp" href="./" style="background:#f1dfc8;color:#563820">Volver al catálogo</a>'],
      [/56954226146/g, '56978496366'],
      [/\+56 9 5422 6146/g, '+56 9 7849 6366'],
      [/9 5422 6146/g, '9 7849 6366'],
      [/mat\.echeverria@gmail\.com/g, 'tudulcediacl@gmail.com']
    ];

    const cssFinal = `
      #orderFlow .actions a.btn.green{display:none!important}
      .mobile-cart-bar{display:none}
      .ux-stepper{display:none}
      @media(max-width:640px){
        body{font-size:15px;padding-bottom:96px!important}
        .wrap{width:min(100% - 14px,1120px)!important}
        .hero{padding:10px 0 2px!important}
        .box{padding:14px!important;margin:9px 0!important;border-radius:18px!important}
        h1{font-size:2.15rem!important;line-height:.98!important;margin:.12em 0!important}
        h2{font-size:1.25rem!important;margin:.15em 0 .35em!important}
        .muted{font-size:.9rem!important;line-height:1.35!important}
        .products{grid-template-columns:1fr!important;gap:9px!important}
        .product{position:relative!important;padding:11px 12px!important;border-radius:16px!important;gap:6px!important;box-shadow:none!important;min-height:auto!important}
        .product:hover{transform:none!important}
        .product.selected{border-width:2px!important;background:#fff4e8!important}
        .top{display:grid!important;grid-template-columns:1fr auto!important;gap:8px!important;align-items:start!important}
        .product h3{font-size:1rem!important;line-height:1.08!important;margin:0!important;display:-webkit-box!important;-webkit-line-clamp:2!important;-webkit-box-orient:vertical!important;overflow:hidden!important}
        .select-badge{min-width:82px!important;width:auto!important;padding:7px 10px!important;font-size:.8rem!important;border-width:1px!important}
        .product.selected .select-badge::before{content:'✓ ';}
        .category-row{margin-top:0!important;gap:6px!important}
        .category-chip{padding:4px 9px!important;font-size:.74rem!important}
        .selected-text{display:none!important}
        .desc{font-size:.82rem!important;line-height:1.2!important;margin:0!important;display:-webkit-box!important;-webkit-line-clamp:1!important;-webkit-box-orient:vertical!important;overflow:hidden!important}
        .price{font-size:1.16rem!important;margin:0!important;line-height:1.05!important}
        .product:not(.selected) .qty{display:none!important}
        .product.selected .qty{display:none!important}
        .ux-stepper{display:none!important;align-items:center!important;justify-content:space-between!important;gap:8px!important;background:#fffaf1!important;border:1px solid #ead8bd!important;border-radius:999px!important;padding:6px!important;margin-top:2px!important}
        .product.selected .ux-stepper{display:flex!important}
        .ux-stepper button{width:38px!important;height:38px!important;min-width:38px!important;padding:0!important;border-radius:50%!important;font-size:1.25rem!important;line-height:1!important;background:#f1dfc8!important;color:#563820!important}
        .ux-stepper .ux-qty{font-weight:950!important;color:#563820!important;min-width:42px!important;text-align:center!important}
        .product small,.product .muted{font-size:.78rem!important}
        .summary{padding:12px!important;border-radius:16px!important}
        .summary h3{margin:.1em 0 .35em!important}
        .total{font-size:1.02rem!important;padding-top:9px!important}
        .lead-notice,.split-box{padding:12px!important;border-radius:16px!important;margin:10px 0!important}
        .field input,.field textarea,.field select,.date-trigger{padding:10px!important;border-radius:12px!important}
        .field textarea{min-height:68px!important}
        .actions{gap:8px!important;margin-top:10px!important}
        button,a.btn{padding:11px 13px!important}
        .mobile-cart-bar{position:fixed!important;left:10px!important;right:10px!important;bottom:10px!important;z-index:9999!important;display:none!important;align-items:center!important;justify-content:space-between!important;gap:10px!important;background:#442916!important;color:#fff!important;border-radius:22px!important;padding:11px 12px!important;box-shadow:0 16px 36px #00000033!important;border:1px solid #ffffff22!important}
        .mobile-cart-bar.show{display:flex!important}
        .mobile-cart-info{display:grid!important;gap:2px!important;line-height:1.1!important}
        .mobile-cart-info strong{font-size:.98rem!important;color:#fff!important}
        .mobile-cart-info span{font-size:.78rem!important;color:#f1dfc8!important;font-weight:750!important}
        .mobile-cart-btn{border:0!important;background:#b8653b!important;color:#fff!important;border-radius:999px!important;padding:11px 14px!important;font-weight:950!important;white-space:nowrap!important}
      }
    `;

    const uxMobileScript = `
      <script>
      (function(){
        const money = new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0});
        function isMobile(){return window.matchMedia('(max-width: 640px)').matches}
        function num(v){return Number(String(v||'').replace(/[^0-9]/g,''))||0}
        function fire(input){input.dispatchEvent(new Event('input',{bubbles:true}));input.dispatchEvent(new Event('change',{bubbles:true}))}
        function cardInput(card){return card.querySelector('.qty input')}
        function setQty(input,value){input.value=Math.max(1,value);fire(input);setTimeout(update,60)}
        function ensureBar(){
          let bar=document.getElementById('mobileCartBar');
          if(bar)return bar;
          bar=document.createElement('div');
          bar.id='mobileCartBar';
          bar.className='mobile-cart-bar';
          bar.innerHTML='<div class="mobile-cart-info"><strong id="mobileCartMain">0 productos · $0</strong><span>Resumen de tu pedido</span></div><button type="button" class="mobile-cart-btn">Continuar</button>';
          document.body.appendChild(bar);
          return bar;
        }
        function enhanceCards(){
          document.querySelectorAll('.product').forEach(function(card){
            if(card.dataset.uxEnhanced)return;
            const input=cardInput(card);
            if(!input)return;
            card.dataset.uxEnhanced='1';
            const stepper=document.createElement('div');
            stepper.className='ux-stepper';
            stepper.innerHTML='<button type="button" aria-label="Quitar">−</button><span class="ux-qty">1</span><button type="button" aria-label="Agregar">+</button>';
            const qty=card.querySelector('.qty');
            if(qty)qty.insertAdjacentElement('afterend',stepper); else card.appendChild(stepper);
            const minus=stepper.children[0], label=stepper.children[1], plus=stepper.children[2];
            minus.onclick=function(e){
              e.preventDefault();e.stopPropagation();
              const v=parseInt(input.value||'1',10)||1;
              if(v<=1){card.click();setTimeout(update,80);return;}
              setQty(input,v-1);
            };
            plus.onclick=function(e){
              e.preventDefault();e.stopPropagation();
              const run=function(){const v=parseInt(input.value||'1',10)||1;setQty(input,v+1)};
              if(!card.classList.contains('selected')||input.disabled){card.click();setTimeout(run,80);return;}
              run();
            };
          });
        }
        function updateSteppers(){
          document.querySelectorAll('.product').forEach(function(card){
            const input=cardInput(card), label=card.querySelector('.ux-qty');
            if(input&&label)label.textContent=String(parseInt(input.value||'1',10)||1);
          });
        }
        function update(){
          enhanceCards();
          updateSteppers();
          const bar=ensureBar();
          let count=0,total=0;
          document.querySelectorAll('.product.selected').forEach(function(card){
            const input=cardInput(card);
            const q=parseInt(input&&input.value||'1',10)||1;
            count+=q;
          });
          const totalText=document.querySelector('#total')?.textContent?.trim()||'$0';
          total=num(totalText);
          const main=document.getElementById('mobileCartMain');
          if(main)main.textContent=count+' '+(count===1?'producto':'productos')+' · '+money.format(total);
          bar.classList.toggle('show',isMobile()&&count>0&&!document.querySelector('#finalScreen.show'));
        }
        document.addEventListener('click',function(){setTimeout(update,90)},true);
        document.addEventListener('input',function(){setTimeout(update,40)},true);
        document.addEventListener('change',function(){setTimeout(update,40)},true);
        new MutationObserver(function(){setTimeout(update,80)}).observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['class','disabled','value']});
        window.addEventListener('resize',update);
        setTimeout(update,400);
        setTimeout(update,1200);
      })();
      <\/script>
    `;

    const flowValidationScript = `
      <script>
      (function(){
        let productStep=null,formStep=null,originalSend=null,wrapped=false;
        const css='.td-step-hidden{display:none!important}.td-flow-steps{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0 14px}.td-flow-chip{border-radius:999px;padding:8px 12px;border:1px solid #ead8bd;background:#fffdf8;color:#7d5b3f;font-weight:950}.td-flow-chip.active{background:#48663f;color:#fff}.td-step-actions,.td-form-top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.td-step-actions button{flex:1;min-width:220px}.td-form-top-actions{margin:0 0 12px}.td-form-top-actions button{background:#f1dfc8;color:#563820}.td-forgot-box{margin:14px 0;padding:16px;border-radius:20px;border:2px solid #ead8bd;background:linear-gradient(135deg,#fff2df,#fffaf1)}.td-forgot-box strong{display:block;color:#442916;font-size:1.08rem;margin-bottom:4px}.td-forgot-box p{margin:.2rem 0 .75rem;color:#684029;font-weight:750}.td-phone-help{display:block;margin-top:6px;color:#7d5b3f;font-size:.84rem;font-weight:750}.td-error-text{display:block;margin-top:6px;color:#9f3d31;font-size:.85rem;font-weight:900}.td-input-error{border-color:#9f3d31!important;background:#fff7f4!important}@media(max-width:640px){.td-flow-steps{position:sticky;top:0;z-index:40;background:#fff8ecdd;padding:8px 0}.td-flow-chip{font-size:.82rem;padding:7px 10px}.td-step-actions button,.td-form-top-actions button{width:100%;min-width:0}}';
        function q(s){return document.querySelector(s)}
        function count(){let n=0;document.querySelectorAll('.product.selected').forEach(c=>{const i=c.querySelector('.qty input');n+=parseInt(i&&i.value||'1',10)||1});return n}
        function steps(){const f=q('#orderFlow');return f?Array.from(f.children).filter(x=>x.tagName&&x.classList.contains('box')):[]}
        function chips(n){document.querySelectorAll('.td-flow-chip').forEach((c,i)=>c.classList.toggle('active',i===n-1))}
        function showProducts(scroll=true){if(!productStep||!formStep)return;productStep.classList.remove('td-step-hidden');formStep.classList.add('td-step-hidden');chips(1);if(scroll)productStep.scrollIntoView({behavior:'smooth',block:'start'})}
        function showForm(scroll=true){if(count()<1){const m=q('#catalogMsg');if(m){m.textContent='Selecciona al menos un producto antes de continuar.';m.classList.remove('hidden')}return}productStep.classList.add('td-step-hidden');formStep.classList.remove('td-step-hidden');chips(2);q('#mobileCartBar')?.classList.remove('show');if(scroll)formStep.scrollIntoView({behavior:'smooth',block:'start'})}
        function phoneOk(show){const code=q('#phoneCode'),phone=q('#phoneNumber'),err=q('#tdPhoneError');if(!code||!phone)return true;let c=String(code.value||'').replace(/\s/g,'');if(c&&!c.startsWith('+'))c='+'+c;const d=String(phone.value||'').replace(/\D/g,'');let ok=c==='+56'&&d.length===9&&d[0]==='9';code.classList.toggle('td-input-error',!ok&&show);phone.classList.toggle('td-input-error',!ok&&show);if(err){err.textContent='Usa +56 y un celular chileno válido: 9 dígitos comenzando con 9.';err.style.display=!ok&&show?'block':'none'}if(ok){code.value='+56';phone.value=d.replace(/(\d)(\d{4})(\d{4})/,'$1 $2 $3')}return ok}
        function check(){let bad=[];const name=q('#name'),date=q('#dateLabel');if(count()<1)bad.push('selecciona productos');if(name&&name.value.trim().length<3){bad.push('ingresa tu nombre');name.classList.add('td-input-error')}else if(name)name.classList.remove('td-input-error');if(!phoneOk(true))bad.push('corrige el teléfono');if(date&&/seleccionar/i.test(date.textContent))bad.push('selecciona fecha');if(bad.length){showForm(true);const m=q('#msg');if(m){m.textContent='Antes de enviar, '+bad.join(', ')+'.';m.className='msg show err'}return false}return true}
        function ui(){const s=steps();if(s.length<2)return;productStep=s[0];formStep=s[1];if(!q('#tdFlowCss')){const st=document.createElement('style');st.id='tdFlowCss';st.textContent=css;document.head.appendChild(st)}if(!q('#tdFlowSteps')){const nav=document.createElement('div');nav.id='tdFlowSteps';nav.className='td-flow-steps';nav.innerHTML='<span class="td-flow-chip active">1 · Elige productos</span><span class="td-flow-chip">2 · Datos y envío</span>';productStep.parentNode.insertBefore(nav,productStep)}if(!q('#tdContinueForm')){const a=document.createElement('div');a.className='td-step-actions';a.innerHTML='<button id="tdContinueForm" type="button" class="primary">Continuar con datos del pedido</button>';(productStep.querySelector('.summary')||productStep).insertAdjacentElement('afterend',a);q('#tdContinueForm').onclick=()=>showForm(true)}if(!q('#tdBackTop')){const a=document.createElement('div');a.className='td-form-top-actions';a.innerHTML='<button id="tdBackTop" type="button">← Volver a productos</button>';const h=formStep.querySelector('h2');h?h.insertAdjacentElement('afterend',a):formStep.insertAdjacentElement('afterbegin',a);q('#tdBackTop').onclick=()=>showProducts(true)}if(!q('#tdForgotBox')){const b=document.createElement('div');b.id='tdForgotBox';b.className='td-forgot-box';b.innerHTML='<strong>¿Olvidaste algo?</strong><p>Antes de enviar, revisa cantidades, fecha solicitada y método de pago. Puedes volver al catálogo para agregar o quitar productos.</p><button id="tdBackForgot" type="button" class="secondary">Revisar productos</button>';const act=formStep.querySelector('.actions');act?act.parentNode.insertBefore(b,act):formStep.appendChild(b);q('#tdBackForgot').onclick=()=>showProducts(true)}const phone=q('#phoneNumber'),code=q('#phoneCode');if(phone&&!q('#tdPhoneError')){const e=document.createElement('small');e.id='tdPhoneError';e.className='td-error-text';e.style.display='none';phone.closest('.field')?.appendChild(e)}if(code&&!q('#tdPhoneHelp')){const h=document.createElement('small');h.id='tdPhoneHelp';h.className='td-phone-help';h.textContent='Usa +56 y número celular chileno. Ej: +56 / 9 7849 6366.';phone.closest('.field')?.appendChild(h)}[code,phone].forEach(x=>x&&!x.dataset.tdLive&&(x.dataset.tdLive='1',x.addEventListener('input',()=>phoneOk(false))));if(!formStep.dataset.stepReady){formStep.dataset.stepReady='1';showProducts(false)}}
        function wrap(){const b=q('#send');if(!b||wrapped)return;wrapped=true;originalSend=b.onclick;b.onclick=function(e){if(!check()){e&&e.preventDefault();return false}if(typeof originalSend==='function')return originalSend.call(this,e)}}
        document.addEventListener('click',e=>{const cart=e.target.closest&&e.target.closest('.mobile-cart-btn');if(cart){e.preventDefault();e.stopPropagation();showForm(true)}},true);
        function init(){ui();wrap()}document.addEventListener('click',()=>setTimeout(init,80),true);document.addEventListener('input',()=>setTimeout(init,40),true);new MutationObserver(()=>setTimeout(init,120)).observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['class']});setTimeout(init,250);setTimeout(init,900);setTimeout(init,1600);
      })();
      <\/script>
    `;

    fetch('./catalogo-dinamico-v8.html', {cache:'no-store'})
      .then(r => r.text())
      .then(html => {
        reemplazos.forEach(([oldValue, newValue]) => { html = html.replace(oldValue, newValue); });
        html = html.replace('</style>', cssFinal + '</style>');
        html = html.replace('</body>', uxMobileScript + flowValidationScript + '</body>');
        document.open();
        document.write(html);
        document.close();
      })
      .catch(() => { document.body.innerHTML = '<main class="card"><h1>No pudimos cargar el catálogo</h1><p>Intenta nuevamente en unos minutos.</p></main>'; });
  </script>
</body>
</html>
