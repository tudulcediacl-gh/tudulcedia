  <title>Tu Dulce Día | Catálogo</title>
  <meta name="description" content="Catálogo de Tu Dulce Día para pedidos de galletas artesanales y pan de masa madre.">
  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#fff8ec;color:#563820;min-height:100vh;display:grid;place-items:center;padding:24px}.card{max-width:560px;background:#fffdf8;border:1px solid #ead8bd;border-radius:24px;padding:24px;box-shadow:0 14px 34px #56382022;text-align:center}.loader{width:42px;height:42px;border:5px solid #ead8bd;border-top-color:#b8653b;border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}

<body>
  <main class="card"><div class="loader"></div><h1>Cargando catálogo…</h1><p>Estamos preparando el catálogo actualizado de Tu Dulce Día.</p></main>
  <script>
    const reemplazos=[[/Tu Dulcedía/g,'Tu Dulce Día'],[/Tu Dulcedia/g,'Tu Dulce Día'],[/Tu Dulce D[ií]a/g,'Tu Dulce Día'],[/AKfycbzmPICimq95KQ4GLloWbgeoonhTWBjzUM7J7kMbz32r9qiooqzC_MY4e2IADroA8Rnl/g,'AKfycby92UZyqaJJMNdu5jzDIvHjALOvqVG2sr1PxvLvod19v5ky9cXO4mBSjfceJ1Mh-Rg'],[/<a class="btn secondary" href="admin-dashboard\.html">Admin<\/a>/g,''],[/<a class="btn secondary" href="\.\/">Catálogo actual<\/a>/g,''],[/<a class="btn green"[^>]*>Consulta por WhatsApp<\/a>/g,''],[/56954226146/g,'56978496366'],[/\+56 9 5422 6146/g,'+56 9 7849 6366'],[/9 5422 6146/g,'9 7849 6366'],[/mat\.echeverria@gmail\.com/g,'tudulcediacl@gmail.com']];

    const cssFinal=`
      .td-step-hidden{display:none!important}.td-flow-steps{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0 14px}.td-flow-chip{border-radius:999px;padding:8px 12px;border:1px solid #ead8bd;background:#fffdf8;color:#7d5b3f;font-weight:950}.td-flow-chip.active{background:#48663f;color:#fff}.td-step-actions,.td-form-top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.td-step-actions button{flex:1;min-width:220px}.td-form-top-actions{margin:0 0 12px}.td-form-top-actions button{background:#f1dfc8;color:#563820}.td-order-folio{background:#fff2df;border:2px solid #e8c18d;border-radius:18px;padding:12px 14px;margin:0 0 12px;text-align:center;color:#442916;font-weight:950;font-size:1.08rem}.td-phone-help{display:block;margin-top:6px;color:#7d5b3f;font-size:.84rem;font-weight:750}.td-error-text{display:block;margin-top:6px;color:#9f3d31;font-size:.85rem;font-weight:900}.td-input-error{border-color:#9f3d31!important;background:#fff7f4!important}.mobile-cart-bar{display:none}
      @media(max-width:640px){body{font-size:15px;padding-bottom:96px!important}.wrap{width:min(100% - 14px,1120px)!important}.box{padding:14px!important;margin:9px 0!important;border-radius:18px!important}.products{grid-template-columns:1fr!important;gap:9px!important}.product{padding:11px 12px!important;border-radius:16px!important;box-shadow:none!important}.product h3{font-size:1rem!important}.desc{font-size:.82rem!important}.price{font-size:1.16rem!important}.td-flow-steps{position:sticky;top:0;z-index:40;background:#fff8ecdd;padding:8px 0}.td-flow-chip{font-size:.82rem;padding:7px 10px}.td-step-actions button,.td-form-top-actions button{width:100%;min-width:0}.mobile-cart-bar{position:fixed!important;left:10px!important;right:10px!important;bottom:10px!important;z-index:9999!important;display:none!important;align-items:center!important;justify-content:space-between!important;gap:10px!important;background:#442916!important;color:#fff!important;border-radius:22px!important;padding:11px 12px!important;box-shadow:0 16px 36px #00000033!important}.mobile-cart-bar.show{display:flex!important}.mobile-cart-info{display:grid!important;gap:2px!important;line-height:1.1!important}.mobile-cart-info strong{font-size:.98rem!important;color:#fff!important}.mobile-cart-info span{font-size:.78rem!important;color:#f1dfc8!important;font-weight:750!important}.mobile-cart-btn{border:0!important;background:#b8653b!important;color:#fff!important;border-radius:999px!important;padding:11px 14px!important;font-weight:950!important;white-space:nowrap!important}}
    `;

    const appScript=`
      <script>
      (function(){
        const q=s=>document.querySelector(s),all=s=>Array.from(document.querySelectorAll(s));
        const money=new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0});
        let productStep=null,formStep=null,wrapped=false,originalSend=null,snapshot=null;
        function orderFlowBoxes(){const f=q('#orderFlow');return f?Array.from(f.children).filter(x=>x.classList&&x.classList.contains('box')):[]}
        function count(){let n=0;all('.product.selected').forEach(c=>{const i=c.querySelector('.qty input');n+=parseInt(i&&i.value||'1',10)||1});return n}
        function selectedItems(){return all('.product.selected').map(card=>{const name=(card.querySelector('h3')?.textContent||'').replace(/\s+/g,' ').trim();const qty=parseInt(card.querySelector('.qty input')?.value||'1',10)||1;return qty+' x '+name}).filter(Boolean)}
        function tipoPedido(){const t=selectedItems().join(' ').toLowerCase();if(t.includes('pan')&&(t.includes('galleta')||t.includes('gall')))return 'Pedido mixto';if(t.includes('pan'))return 'Pedido de pan';if(t.includes('galleta')||t.includes('gall'))return 'Pedido de galletas';return 'Pedido'}
        function payValue(){return (q('#pay')?.value||'').trim()}
        function isTransfer(){return /transfer/i.test(payValue())}
        function chip(n){all('.td-flow-chip').forEach((c,i)=>c.classList.toggle('active',i===n-1))}
        function showProducts(scroll){document.body.classList.remove('td-show-form');if(productStep)productStep.classList.remove('td-step-hidden');if(formStep)formStep.classList.add('td-step-hidden');chip(1);updateMobile();if(scroll&&productStep)productStep.scrollIntoView({behavior:'smooth',block:'start'})}
        function showForm(scroll){if(count()<1){const m=q('#catalogMsg');if(m){m.textContent='Selecciona al menos un producto antes de continuar.';m.classList.remove('hidden')}return}document.body.classList.add('td-show-form');if(productStep)productStep.classList.add('td-step-hidden');if(formStep)formStep.classList.remove('td-step-hidden');chip(2);q('#mobileCartBar')?.classList.remove('show');if(scroll&&formStep)formStep.scrollIntoView({behavior:'smooth',block:'start'})}
        function ensureFlow(){const b=orderFlowBoxes();if(b.length<2)return;productStep=b[0];formStep=b[1];if(!q('#tdFlowSteps')){const n=document.createElement('div');n.id='tdFlowSteps';n.className='td-flow-steps';n.innerHTML='<span class="td-flow-chip active">1 · Elige productos</span><span class="td-flow-chip">2 · Datos y envío</span>';productStep.parentNode.insertBefore(n,productStep)}if(!q('#tdContinueForm')){const a=document.createElement('div');a.className='td-step-actions';a.innerHTML='<button id="tdContinueForm" type="button" class="primary">Continuar con datos del pedido</button>';(productStep.querySelector('.summary')||productStep).insertAdjacentElement('afterend',a);q('#tdContinueForm').onclick=()=>showForm(true)}if(!q('#tdBackTop')){const a=document.createElement('div');a.className='td-form-top-actions';a.innerHTML='<button id="tdBackTop" type="button">← Volver a productos</button>';const h=formStep.querySelector('h2');h?h.insertAdjacentElement('afterend',a):formStep.insertAdjacentElement('afterbegin',a);q('#tdBackTop').onclick=()=>showProducts(true)}if(!formStep.dataset.tdReady){formStep.dataset.tdReady='1';showProducts(false)}}
        function ensureMobileBar(){let b=q('#mobileCartBar');if(b)return b;b=document.createElement('div');b.id='mobileCartBar';b.className='mobile-cart-bar';b.innerHTML='<div class="mobile-cart-info"><strong id="mobileCartMain">0 productos · $0</strong><span>Resumen de tu pedido</span></div><button type="button" class="mobile-cart-btn">Continuar</button>';document.body.appendChild(b);b.querySelector('button').onclick=()=>showForm(true);return b}
        function updateMobile(){const b=ensureMobileBar();let total=Number(String(q('#total')?.textContent||'').replace(/[^0-9]/g,''))||0;const main=q('#mobileCartMain');if(main)main.textContent=count()+' '+(count()===1?'producto':'productos')+' · '+money.format(total);b.classList.toggle('show',matchMedia('(max-width:640px)').matches&&count()>0&&!q('#finalScreen.show')&&!document.body.classList.contains('td-show-form'))}
        function makeSnapshot(){snapshot={cliente:(q('#name')?.value||'').trim()||'No indicado',fecha:(q('#dateLabel')?.textContent||q('#date')?.value||'').trim()||'No indicada',total:(q('#total')?.textContent||'$0').trim(),pedido:selectedItems().join(', ')||'No indicado',tipo:tipoPedido(),metodo:payValue()||'No indicado'}}
        function findFolio(){if(window.tdLastOrderFolio)return window.tdLastOrderFolio;const m=String(document.body.textContent||'').match(/TD-\d{3,}/i);return m&&m[0]}
        function buildWhatsapp(folio){const o=snapshot||{cliente:'No indicado',fecha:'No indicada',total:(q('#total')?.textContent||'$0').trim(),pedido:selectedItems().join(', ')||'No indicado',tipo:tipoPedido(),metodo:payValue()||'No indicado'};const n=folio||findFolio()||'pendiente de asignar';const nl=String.fromCharCode(10);return ['Hola, acabo de enviar un pedido por Tu Dulce Día.','Cliente: '+o.cliente+'.','N° pedido: '+n+'.','Fecha solicitada: '+o.fecha+'.','Total estimado: '+o.total+'.',o.tipo+': '+o.pedido+'.','Método de pago: '+o.metodo+'.',isTransfer()?'Quisiera solicitar los datos de transferencia para mi pedido.':'Quisiera consultar por WhatsApp sobre mi pedido.'].join(nl)}
        function applyFinal(){const folio=findFolio();const fs=q('#finalSummary');if(folio&&fs&&!q('#tdOrderFolioBox'))fs.insertAdjacentHTML('afterbegin','<div id="tdOrderFolioBox" class="td-order-folio">Pedido N° '+folio+'</div>');const wh=q('#finalWhatsapp');if(wh){wh.textContent=isTransfer()?'Solicitar datos transferencia':'Consultar por WhatsApp';wh.href='https://wa.me/56978496366?text='+encodeURIComponent(buildWhatsapp(folio||''))}}
        function wrapSend(){const b=q('#send');if(!b||wrapped)return;wrapped=true;originalSend=b.onclick;b.onclick=function(e){makeSnapshot();const r=typeof originalSend==='function'?originalSend.call(this,e):undefined;[200,600,1200,2200,4000].forEach(ms=>setTimeout(applyFinal,ms));return r}}
        function tick(){ensureFlow();wrapSend();updateMobile();applyFinal()}
        document.addEventListener('input',()=>setTimeout(tick,60),true);document.addEventListener('change',()=>setTimeout(tick,60),true);document.addEventListener('click',()=>setTimeout(tick,100),true);new MutationObserver(()=>setTimeout(tick,120)).observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['class','href']});setTimeout(tick,100);setTimeout(tick,700);setTimeout(tick,1500);
      })();
      <\/script>
    `;

    fetch('./catalogo-dinamico-v8.html',{cache:'no-store'}).then(r=>r.text()).then(html=>{reemplazos.forEach(([a,b])=>{html=html.replace(a,b)});html=html.replace('</style>',cssFinal+'</style>');html=html.replace('</body>',appScript+'</body>');document.open();document.write(html);document.close()}).catch(()=>{document.body.innerHTML='<main class="card"><h1>No pudimos cargar el catálogo</h1><p>Intenta nuevamente en unos minutos.</p></main>'});
  </script>
</body>
