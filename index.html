td-form-top-actions button{width:100%;min-width:0}.td-suggest-chip{width:auto!important;min-width:0!important;font-size:.84rem!important}}

    const appScript=`
      <script>
      (function(){
        const money=new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0});let productStep=null,formStep=null,originalSend=null,wrapped=false;
        const countries=[['Chile','+56',9,9],['Argentina','+54',10,11],['Perú','+51',9,9],['Bolivia','+591',8,8],['Colombia','+57',10,10],['Ecuador','+593',8,9],['Venezuela','+58',10,10],['Brasil','+55',10,11],['Uruguay','+598',8,9],['Paraguay','+595',8,9],['México','+52',10,10],['Estados Unidos / Canadá','+1',10,10],['España','+34',9,9],['Otro país','+',6,15]];
        const q=s=>document.querySelector(s);const all=s=>Array.from(document.querySelectorAll(s));
        function count(){let n=0;all('.product.selected').forEach(c=>{const i=c.querySelector('.qty input');n+=parseInt(i&&i.value||'1',10)||1});return n}
        function fire(input){if(!input)return;input.dispatchEvent(new Event('input',{bubbles:true}));input.dispatchEvent(new Event('change',{bubbles:true}))}
        function callBase(){['updateSummary','renderSummary','syncSummary','renderLeadNotice','updateLeadNotice','updateCalendar','renderCalendar'].forEach(fn=>{try{if(typeof window[fn]==='function')window[fn]()}catch(e){}})}
        function cardInput(card){return card.querySelector('.qty input')}
        function setQty(input,value){input.value=Math.max(1,value);fire(input);setTimeout(()=>{callBase();updateMobile();renderSuggestions()},80)}
        function forceSelect(card){if(!card)return;const qty=cardInput(card);const check=card.querySelector('.native-check,input[type="checkbox"]');if(!card.classList.contains('selected'))card.dispatchEvent(new MouseEvent('click',{bubbles:true,cancelable:true,view:window}));setTimeout(()=>{if(!card.classList.contains('selected')){card.classList.add('selected');if(check){check.checked=true;fire(check)}if(qty){qty.disabled=false;if(!qty.value||Number(qty.value)<1)qty.value=1;fire(qty)}}if(qty){qty.disabled=false;if(!qty.value||Number(qty.value)<1)qty.value=1;fire(qty)}callBase();updateMobile();renderSuggestions()},140)}
        function setupSteppers(){all('.product').forEach(card=>{if(card.dataset.uxEnhanced)return;const input=cardInput(card);if(!input)return;card.dataset.uxEnhanced='1';const s=document.createElement('div');s.className='ux-stepper';s.innerHTML='<button type="button">−</button><span class="ux-qty">1</span><button type="button">+</button>';(card.querySelector('.qty')||card).insertAdjacentElement('afterend',s);s.children[0].onclick=e=>{e.preventDefault();e.stopPropagation();const v=parseInt(input.value||'1',10)||1;if(v<=1){card.dispatchEvent(new MouseEvent('click',{bubbles:true,cancelable:true,view:window}));setTimeout(refreshAll,120);return}setQty(input,v-1)};s.children[2].onclick=e=>{e.preventDefault();e.stopPropagation();if(!card.classList.contains('selected')||input.disabled){forceSelect(card)}else setQty(input,(parseInt(input.value||'1',10)||1)+1)}})}
        function ensureCart(){let b=q('#mobileCartBar');if(b)return b;b=document.createElement('div');b.id='mobileCartBar';b.className='mobile-cart-bar';b.innerHTML='<div class="mobile-cart-info"><strong id="mobileCartMain">0 productos · $0</strong><span>Resumen de tu pedido</span></div><button type="button" class="mobile-cart-btn">Continuar</button>';document.body.appendChild(b);b.querySelector('button').onclick=()=>showForm(true);return b}
        function updateMobile(){setupSteppers();all('.product').forEach(c=>{const i=cardInput(c),l=c.querySelector('.ux-qty');if(i&&l)l.textContent=String(parseInt(i.value||'1',10)||1)});const b=ensureCart();let total=Number(String(q('#total')?.textContent||'').replace(/[^0-9]/g,''))||0;const main=q('#mobileCartMain');if(main)main.textContent=count()+' '+(count()===1?'producto':'productos')+' · '+money.format(total);b.classList.toggle('show',matchMedia('(max-width:640px)').matches&&count()>0&&!q('#finalScreen.show'))}
        function steps(){const f=q('#orderFlow');return f?Array.from(f.children).filter(x=>x.tagName&&x.classList.contains('box')):[]}
        function chips(n){all('.td-flow-chip').forEach((c,i)=>c.classList.toggle('active',i===n-1))}
        function showProducts(scroll=true){if(!productStep||!formStep)return;productStep.classList.remove('td-step-hidden');formStep.classList.add('td-step-hidden');chips(1);if(scroll)productStep.scrollIntoView({behavior:'smooth',block:'start'})}
        function showForm(scroll=true){if(count()<1){const m=q('#catalogMsg');if(m){m.textContent='Selecciona al menos un producto antes de continuar.';m.classList.remove('hidden')}return}productStep.classList.add('td-step-hidden');formStep.classList.remove('td-step-hidden');chips(2);q('#mobileCartBar')?.classList.remove('show');renderSuggestions();if(scroll)formStep.scrollIntoView({behavior:'smooth',block:'start'})}
        function cleanName(card){return (card.querySelector('h3')?.textContent||'Producto').trim()}
        function renderSuggestions(){const list=q('#tdSuggestList');if(!list)return;const options=all('.product:not(.selected)').slice(0,4);if(!options.length){list.innerHTML='<span class="muted">Ya agregaste todos los productos disponibles.</span>';return}list.innerHTML=options.map((c,i)=>'<button type="button" class="td-suggest-chip" data-suggest="'+i+'">+ '+cleanName(c)+'</button>').join('');list.querySelectorAll('[data-suggest]').forEach(btn=>{btn.onclick=e=>{e.preventDefault();e.stopPropagation();const card=options[Number(btn.dataset.suggest)];btn.classList.add('added');btn.textContent='Agregado ✓';forceSelect(card)}})}
        function ensureCountrySelect(){const old=q('#phoneCode');if(!old||old.tagName==='SELECT')return old;const sel=document.createElement('select');sel.id='phoneCode';sel.name=old.name||'phoneCode';sel.className=old.className;sel.setAttribute('aria-label','Código de país');countries.forEach(c=>{const o=document.createElement('option');o.value=c[1];o.textContent=c[0]+' '+c[1];o.dataset.min=c[2];o.dataset.max=c[3];o.dataset.country=c[0];if(c[1]==='+56')o.selected=true;sel.appendChild(o)});old.replaceWith(sel);return sel}
        function phoneOk(show){const code=ensureCountrySelect(),phone=q('#phoneNumber'),err=q('#tdPhoneError');if(!code||!phone)return true;const opt=code.selectedOptions[0];const min=Number(opt?.dataset.min||6),max=Number(opt?.dataset.max||15),country=opt?.dataset.country||'el país seleccionado';const d=String(phone.value||'').replace(/\D/g,'');let ok=d.length>=min&&d.length<=max;if(country==='Chile')ok=d.length===9;code.classList.toggle('td-input-error',!ok&&show);phone.classList.toggle('td-input-error',!ok&&show);if(err){err.textContent='Ingresa un teléfono válido para '+country+': '+(min===max?min+' dígitos':'entre '+min+' y '+max+' dígitos')+'.';err.style.display=!ok&&show?'block':'none'}if(ok&&country==='Chile')phone.value=d.replace(/(\d)(\d{4})(\d{4})/,'$1 $2 $3');return ok}
        function check(){let bad=[];const name=q('#name'),date=q('#dateLabel'),pay=q('#pay');if(count()<1)bad.push('selecciona productos');if(name&&name.value.trim().length<2){bad.push('ingresa tu nombre');name.classList.add('td-input-error')}else if(name)name.classList.remove('td-input-error');if(!phoneOk(true))bad.push('corrige el teléfono');if(date&&/seleccionar/i.test(date.textContent))bad.push('selecciona fecha de entrega/retiro');if(pay&&!pay.value)bad.push('selecciona método de pago');if(bad.length){showForm(true);const m=q('#msg');if(m){m.textContent='Antes de enviar, '+bad.join(', ')+'.';m.className='msg show err'}return false}return true}
        function tuneTexts(){all('label').forEach(l=>{let t=l.textContent.trim();if(t==='Fecha solicitada')l.textContent='Fecha de entrega/retiro';if(t==='Observación')l.textContent='Observación opcional'});const pay=q('#pay');if(pay&&!pay.dataset.requiredReady){pay.dataset.requiredReady='1';const o=document.createElement('option');o.value='';o.textContent='Selecciona método de pago';pay.insertBefore(o,pay.firstChild);pay.value=''}const phone=q('#phoneNumber'),code=ensureCountrySelect();if(phone&&!q('#tdPhoneError')){const e=document.createElement('small');e.id='tdPhoneError';e.className='td-error-text';e.style.display='none';phone.closest('.field')?.appendChild(e)}if(code&&!q('#tdPhoneHelp')){const h=document.createElement('small');h.id='tdPhoneHelp';h.className='td-phone-help';h.textContent='Selecciona el país y escribe el número sin espacios ni guiones. Para Chile son 9 dígitos.';phone.closest('.field')?.appendChild(h)}[code,phone].forEach(x=>x&&!x.dataset.tdLive&&(x.dataset.tdLive='1',x.addEventListener('input',()=>phoneOk(false)),x.addEventListener('change',()=>phoneOk(false))))}
        function setupFlow(){const s=steps();if(s.length<2)return;productStep=s[0];formStep=s[1];if(!q('#tdFlowSteps')){const n=document.createElement('div');n.id='tdFlowSteps';n.className='td-flow-steps';n.innerHTML='<span class="td-flow-chip active">1 · Elige productos</span><span class="td-flow-chip">2 · Datos y envío</span>';productStep.parentNode.insertBefore(n,productStep)}if(!q('#tdContinueForm')){const a=document.createElement('div');a.className='td-step-actions';a.innerHTML='<button id="tdContinueForm" type="button" class="primary">Continuar con datos del pedido</button>';(productStep.querySelector('.summary')||productStep).insertAdjacentElement('afterend',a);q('#tdContinueForm').onclick=()=>showForm(true)}if(!q('#tdBackTop')){const a=document.createElement('div');a.className='td-form-top-actions';a.innerHTML='<button id="tdBackTop" type="button">← Volver a productos</button>';const h=formStep.querySelector('h2');h?h.insertAdjacentElement('afterend',a):formStep.insertAdjacentElement('afterbegin',a);q('#tdBackTop').onclick=()=>showProducts(true)}if(!q('#tdForgotBox')){const b=document.createElement('div');b.id='tdForgotBox';b.className='td-forgot-box';b.innerHTML='<strong>¿Olvidaste algo?</strong><p>También podrías agregar alguno de estos productos a tu pedido:</p><div id="tdSuggestList" class="td-suggest-list"></div><button id="tdSkipSuggest" type="button" class="td-suggest-skip">No gracias, continuar con mi pedido</button>';const act=formStep.querySelector('.actions');act?act.parentNode.insertBefore(b,act):formStep.appendChild(b);q('#tdSkipSuggest').onclick=()=>q('#send')?.scrollIntoView({behavior:'smooth',block:'center'})}tuneTexts();if(!formStep.dataset.stepReady){formStep.dataset.stepReady='1';showProducts(false)}}
        function wrap(){const b=q('#send');if(!b||wrapped)return;wrapped=true;originalSend=b.onclick;b.onclick=function(e){if(!check()){e&&e.preventDefault();return false}if(typeof originalSend==='function')return originalSend.call(this,e)}}
        function hookClear(){const b=q('#clear');if(!b||b.dataset.tdHooked)return;b.dataset.tdHooked='1';b.addEventListener('click',()=>setTimeout(()=>{showProducts(false);callBase();refreshAll()},180),true)}
        function refreshAll(){setupFlow();setupSteppers();updateMobile();renderSuggestions();wrap();hookClear()}
        document.addEventListener('click',()=>setTimeout(refreshAll,80),true);document.addEventListener('input',()=>setTimeout(refreshAll,40),true);document.addEventListener('change',()=>setTimeout(refreshAll,40),true);new MutationObserver(()=>setTimeout(refreshAll,120)).observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['class','disabled','value']});setTimeout(refreshAll,250);setTimeout(refreshAll,900);setTimeout(refreshAll,1600);
      })();
      <\/script>
    `;

    fetch('./catalogo-dinamico-v8.html',{cache:'no-store'}).then(r=>r.text()).then(html=>{reemplazos.forEach(([a,b])=>{html=html.replace(a,b)});html=html.replace('</style>',cssFinal+'</style>');html=html.replace('</body>',appScript+'</body>');document.open();document.write(html);document.close()}).catch(()=>{document.body.innerHTML='<main class="card"><h1>No pudimos cargar el catálogo</h1><p>Intenta nuevamente en unos minutos.</p></main>'});
