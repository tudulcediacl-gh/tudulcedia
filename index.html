<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tu Dulce Día | Catálogo</title>
  <meta name="description" content="Catálogo de Tu Dulce Día para pedidos de galletas artesanales y pan de masa madre.">
  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#fff8ec;color:#563820;min-height:100vh;display:grid;place-items:center;padding:24px}.card{max-width:560px;background:#fffdf8;border:1px solid #ead8bd;border-radius:24px;padding:24px;box-shadow:0 14px 34px #56382022;text-align:center}.loader{width:42px;height:42px;border:5px solid #ead8bd;border-top-color:#b8653b;border-radius:50%;margin:0 auto 16px;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card"><div class="loader"></div><h1>Cargando catálogo…</h1><p>Estamos preparando el catálogo actualizado de Tu Dulce Día.</p></main>
  <script>
    const reemplazos=[
      [/Tu Dulcedía/g,'Tu Dulce Día'],
      [/Tu Dulcedia/g,'Tu Dulce Día'],
      [/Tu Dulce D[ií]a/g,'Tu Dulce Día'],
      [/<a class="btn secondary" href="admin-dashboard\.html">Admin<\/a>/g,''],
      [/<a class="btn secondary" href="\.\/">Catálogo actual<\/a>/g,''],
      [/<a class="btn green"[^>]*>Consulta por WhatsApp<\/a>/g,''],
      [/56954226146/g,'56978496366'],
      [/\+56 9 5422 6146/g,'+56 9 7849 6366'],
      [/9 5422 6146/g,'9 7849 6366'],
      [/mat\.echeverria@gmail\.com/g,'tudulcediacl@gmail.com']
    ];

    const cssFinal=`
      .td-step-hidden{display:none!important}.td-flow-steps{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:8px 0 14px}.td-flow-chip{border-radius:999px;padding:8px 12px;border:1px solid #ead8bd;background:#fffdf8;color:#7d5b3f;font-weight:950}.td-flow-chip.active{background:#48663f;color:#fff}.td-step-actions,.td-form-top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.td-step-actions button{flex:1;min-width:220px}.td-form-top-actions{margin:0 0 12px}.td-form-top-actions button{background:#f1dfc8;color:#563820}.td-order-folio{background:#fff2df;border:2px solid #e8c18d;border-radius:18px;padding:12px 14px;margin:0 0 12px;text-align:center;color:#442916;font-weight:950;font-size:1.08rem}.mobile-cart-bar{display:none}.td-error-text{display:block;margin-top:10px;color:#9f3d31;font-weight:900}.td-loading{opacity:.75;pointer-events:none}
      @media(max-width:640px){body{font-size:15px;padding-bottom:96px!important}.wrap{width:min(100% - 14px,1120px)!important}.box{padding:14px!important;margin:9px 0!important;border-radius:18px!important}.products{grid-template-columns:1fr!important;gap:9px!important}.product{padding:11px 12px!important;border-radius:16px!important;box-shadow:none!important}.product h3{font-size:1rem!important}.desc{font-size:.82rem!important}.price{font-size:1.16rem!important}.td-flow-steps{position:sticky;top:0;z-index:40;background:#fff8ecdd;padding:8px 0}.td-flow-chip{font-size:.82rem;padding:7px 10px}.td-step-actions button,.td-form-top-actions button{width:100%;min-width:0}.mobile-cart-bar{position:fixed!important;left:10px!important;right:10px!important;bottom:10px!important;z-index:9999!important;display:none!important;align-items:center!important;justify-content:space-between!important;gap:10px!important;background:#442916!important;color:#fff!important;border-radius:22px!important;padding:11px 12px!important;box-shadow:0 16px 36px #00000033!important}.mobile-cart-bar.show{display:flex!important}.mobile-cart-info{display:grid!important;gap:2px!important;line-height:1.1!important}.mobile-cart-info strong{font-size:.98rem!important;color:#fff!important}.mobile-cart-info span{font-size:.78rem!important;color:#f1dfc8!important;font-weight:750!important}.mobile-cart-btn{border:0!important;background:#b8653b!important;color:#fff!important;border-radius:999px!important;padding:11px 14px!important;font-weight:950!important;white-space:nowrap!important}}
    `;

    const appScript=`
      <script>
      (function(){
        const API_FORMAL='https://script.google.com/macros/s/AKfycbzmPICimq95KQ4GLloWbgeoonhTWBjzUM7J7kMbz32r9qiooqzC_MY4e2IADroA8Rnl/exec';
        const q=s=>document.querySelector(s),all=s=>Array.from(document.querySelectorAll(s));
        const money=new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0});
        let productStep=null,formStep=null,hooked=false,sending=false;
        function escapeHtml(v){return String(v||'').replace(/[&<>\"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#039;'}[c]})}
        function boxes(){const f=q('#orderFlow');return f?Array.from(f.children).filter(x=>x.classList&&x.classList.contains('box')):[]}
        function count(){let n=0;all('.product.selected').forEach(c=>{const i=c.querySelector('.qty input');n+=parseInt(i&&i.value||'1',10)||1});return n}
        function priceFrom(card){const txt=card.querySelector('.price')?.textContent||'';return Number(String(txt).replace(/[^0-9]/g,''))||0}
        function productName(card){return String(card.querySelector('h3')?.textContent||'').replace(/\s+/g,' ').trim()}
        function selectedProducts(){return all('.product.selected').map(function(card){const qty=parseInt(card.querySelector('.qty input')?.value||'1',10)||1;const price=priceFrom(card);const name=productName(card);const category=String(card.querySelector('.category-chip')?.textContent||'').trim().toLowerCase();return {id:card.dataset.id||'',nombre:name,categoria:category,precio:price,cantidad:qty,subtotal:price*qty}}).filter(p=>p.nombre&&p.cantidad>0)}
        function tipoPedido(items){const t=items.map(p=>p.nombre+' '+p.categoria).join(' ').toLowerCase();if(t.includes('pan')&&(t.includes('galleta')||t.includes('gall')))return 'Pedido mixto';if(t.includes('pan'))return 'Pedido de pan';if(t.includes('galleta')||t.includes('gall'))return 'Pedido de galletas';return 'Pedido'}
        function payValue(){return (q('#pay')?.value||'').trim()||'Transferencia bancaria'}
        function isTransfer(){return /transfer/i.test(payValue())}
        function phoneValue(){const code=(q('#phoneCode')?.value||'').trim();const num=(q('#phoneNumber')?.value||'').trim();return (code+' '+num).trim()}
        function dateValue(){return (q('#dateLabel')?.textContent||q('#date')?.value||'').replace(/Seleccionar fecha/i,'').trim()}
        function setMsg(text,isError){const m=q('#msg');if(!m)return; m.textContent=text; m.className='msg show '+(isError?'err':'ok')}
        function chip(n){all('.td-flow-chip').forEach((c,i)=>c.classList.toggle('active',i===n-1))}
        function showProducts(scroll){document.body.classList.remove('td-show-form');if(productStep)productStep.classList.remove('td-step-hidden');if(formStep)formStep.classList.add('td-step-hidden');chip(1);updateMobile();if(scroll&&productStep)productStep.scrollIntoView({behavior:'smooth',block:'start'})}
        function showForm(scroll){if(count()<1){const m=q('#catalogMsg');if(m){m.textContent='Selecciona al menos un producto antes de continuar.';m.classList.remove('hidden')}return}document.body.classList.add('td-show-form');if(productStep)productStep.classList.add('td-step-hidden');if(formStep)formStep.classList.remove('td-step-hidden');chip(2);q('#mobileCartBar')?.classList.remove('show');if(scroll&&formStep)formStep.scrollIntoView({behavior:'smooth',block:'start'})}
        function ensureFlow(){const b=boxes();if(b.length<2)return;productStep=b[0];formStep=b[1];if(!q('#tdFlowSteps')){const n=document.createElement('div');n.id='tdFlowSteps';n.className='td-flow-steps';n.innerHTML='<span class="td-flow-chip active">1 · Elige productos</span><span class="td-flow-chip">2 · Datos y envío</span>';productStep.parentNode.insertBefore(n,productStep)}if(!q('#tdContinueForm')){const a=document.createElement('div');a.className='td-step-actions';a.innerHTML='<button id="tdContinueForm" type="button" class="primary">Continuar con datos del pedido</button>';(productStep.querySelector('.summary')||productStep).insertAdjacentElement('afterend',a);q('#tdContinueForm').onclick=()=>showForm(true)}if(!q('#tdBackTop')){const a=document.createElement('div');a.className='td-form-top-actions';a.innerHTML='<button id="tdBackTop" type="button">← Volver a productos</button>';const h=formStep.querySelector('h2');h?h.insertAdjacentElement('afterend',a):formStep.insertAdjacentElement('afterbegin',a);q('#tdBackTop').onclick=()=>showProducts(true)}if(!formStep.dataset.tdReady){formStep.dataset.tdReady='1';showProducts(false)}}
        function ensureMobileBar(){let b=q('#mobileCartBar');if(b)return b;b=document.createElement('div');b.id='mobileCartBar';b.className='mobile-cart-bar';b.innerHTML='<div class="mobile-cart-info"><strong id="mobileCartMain">0 productos · $0</strong><span>Resumen de tu pedido</span></div><button type="button" class="mobile-cart-btn">Continuar</button>';document.body.appendChild(b);b.querySelector('button').onclick=()=>showForm(true);return b}
        function updateMobile(){const b=ensureMobileBar();let total=Number(String(q('#total')?.textContent||'').replace(/[^0-9]/g,''))||0;const main=q('#mobileCartMain');if(main)main.textContent=count()+' '+(count()===1?'producto':'productos')+' · '+money.format(total);b.classList.toggle('show',matchMedia('(max-width:640px)').matches&&count()>0&&!q('#finalScreen.show')&&!document.body.classList.contains('td-show-form'))}
        function validatePayload(payload){if(!payload.nombreCliente||payload.nombreCliente.length<2)return 'Ingresa tu nombre.';if(!payload.fechaSolicitada)return 'Selecciona fecha de entrega/retiro.';if(!payload.productosSeleccionados.length)return 'Selecciona al menos un producto.';return ''}
        function buildPayload(){const productos=selectedProducts();return {nombreCliente:(q('#name')?.value||'').trim(),telefonoCliente:phoneValue(),fechaSolicitada:dateValue(),productosSeleccionados:productos,observacion:(q('#obs')?.value||'').trim(),totalEstimado:productos.reduce((s,p)=>s+p.subtotal,0),metodoPago:payValue(),requiereDatosTransferencia:isTransfer(),entregaSeparada:q('input[name="split"]:checked')?.value==='yes',notaEntrega:tipoPedido(productos),origen:'Catálogo web'}}
        function jsonpRegistrar(payload){return new Promise(function(resolve,reject){const cb='tdPedido_'+Date.now()+'_'+Math.floor(Math.random()*100000);const script=document.createElement('script');const timer=setTimeout(function(){cleanup();reject(new Error('No hubo respuesta del servidor.'))},15000);function cleanup(){clearTimeout(timer);delete window[cb];script.remove()}window[cb]=function(data){cleanup();resolve(data)};script.onerror=function(){cleanup();reject(new Error('No se pudo conectar con el servidor.'))};script.src=API_FORMAL+'?action=registrarPedido&callback='+encodeURIComponent(cb)+'&payload='+encodeURIComponent(JSON.stringify(payload));document.body.appendChild(script)})}
        function renderFinal(payload,res){const folio=res.folioPedido||res.numeroPedido||res.folio||'';const productosTexto=payload.productosSeleccionados.map(p=>p.nombre+' x '+p.cantidad+' · '+money.format(p.subtotal)).join('</li><li>');const fs=q('#finalSummary');if(fs){fs.innerHTML='<div class="td-order-folio">Pedido N° '+escapeHtml(folio)+'</div><h3>Resumen de tu compra</h3><p><strong>Cliente:</strong> '+escapeHtml(payload.nombreCliente)+'</p><p><strong>Teléfono:</strong> '+escapeHtml(payload.telefonoCliente)+'</p><p><strong>Fecha solicitada:</strong> '+escapeHtml(payload.fechaSolicitada)+'</p><p><strong>Entrega/retiro:</strong> '+escapeHtml(payload.notaEntrega)+'.</p><p><strong>Método de pago:</strong> '+escapeHtml(payload.metodoPago)+'</p><ul><li>'+productosTexto+'</li></ul><div class="total"><span>Total estimado</span><span>'+money.format(payload.totalEstimado)+'</span></div><p class="muted"><strong>Tu pedido queda sujeto a confirmación de disponibilidad.</strong></p>'}const wh=q('#finalWhatsapp');if(wh){wh.textContent=isTransfer()?'Solicitar datos transferencia':'Consultar por WhatsApp';wh.href='https://wa.me/56978496366?text='+encodeURIComponent(res.whatsappMensaje||'Hola, acabo de enviar el pedido '+folio+' por Tu Dulce Día.')}q('#orderFlow')?.classList.add('hidden');q('#finalScreen')?.classList.add('show');window.scrollTo({top:0,behavior:'smooth'})}
        async function handleSend(e){e.preventDefault();e.stopImmediatePropagation();if(sending)return false;const payload=buildPayload();const error=validatePayload(payload);if(error){setMsg(error,true);showForm(true);return false}try{sending=true;const btn=q('#send');if(btn){btn.disabled=true;btn.classList.add('td-loading');btn.textContent='Enviando pedido...'}const res=await jsonpRegistrar(payload);if(!res||res.exito!==true)throw new Error(res&&res.mensaje?res.mensaje:'No se pudo registrar el pedido.');renderFinal(payload,res)}catch(err){setMsg(err.message||'No se pudo registrar el pedido.',true);const btn=q('#send');if(btn){btn.disabled=false;btn.classList.remove('td-loading');btn.textContent='Enviar pedido'}}finally{sending=false}return false}
        function hookSend(){const b=q('#send');if(!b||hooked)return;hooked=true;b.addEventListener('click',handleSend,true)}
        function tick(){ensureFlow();hookSend();updateMobile()}
        document.addEventListener('input',()=>setTimeout(tick,80),true);document.addEventListener('change',()=>setTimeout(tick,80),true);document.addEventListener('click',()=>setTimeout(tick,120),true);new MutationObserver(()=>setTimeout(tick,140)).observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['class','href']});setTimeout(tick,120);setTimeout(tick,700);setTimeout(tick,1500);
      })();
      <\/script>
    `;

    fetch('./catalogo-dinamico-v8.html',{cache:'no-store'}).then(r=>r.text()).then(html=>{reemplazos.forEach(([a,b])=>{html=html.replace(a,b)});html=html.replace('</style>',cssFinal+'</style>');html=html.replace('</body>',appScript+'</body>');document.open();document.write(html);document.close()}).catch(()=>{document.body.innerHTML='<main class="card"><h1>No pudimos cargar el catálogo</h1><p>Intenta nuevamente en unos minutos.</p></main>'});
  </script>
</body>
</html>
