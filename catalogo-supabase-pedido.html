<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Catálogo Supabase Pedido</title><style>:root{--bg:#fff8ec;--card:#fffdf8;--line:#ead8bd;--text:#563820;--muted:#7d5b3f;--acc:#b8653b;--ok:#48663f;--bad:#9f3d31;--info:#315d88;--warn:#8f492b}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--bg),#f3e4cb);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.wrap{width:min(1280px,calc(100% - 28px));margin:auto;padding:24px 0 70px}.card{background:#ffffffdd;border:1px solid var(--line);border-radius:24px;padding:18px;margin:12px 0;box-shadow:0 14px 34px #56382022}h1{margin:0;font-size:clamp(1.9rem,4vw,2.8rem)}.muted{color:var(--muted);font-weight:800}.grid{display:grid;grid-template-columns:1.4fr .8fr;gap:14px}.products{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.product{background:#fffdf8;border:1px solid var(--line);border-radius:18px;padding:12px}.product.selected{border-color:var(--acc);box-shadow:0 10px 24px #b8653b22}.product h3{margin:0 0 5px;font-size:1rem}.price{font-size:1.25rem;font-weight:1000;color:var(--acc)}.small{font-size:.8rem;color:var(--muted);font-weight:800}.row{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:8px}input,select,textarea{width:100%;border:1px solid #dec6a3;border-radius:12px;padding:10px;background:#fffdf8;color:var(--text);font:inherit;font-weight:750}textarea{min-height:70px}label{display:grid;gap:5px;margin:8px 0;font-weight:950}.qty{width:70px}button,a{border:0;border-radius:999px;padding:10px 13px;text-decoration:none;font-weight:950;cursor:pointer;font:inherit;display:inline-flex;align-items:center;justify-content:center}.primary{background:var(--acc);color:#fff}.secondary{background:#f1dfc8;color:var(--text)}.green{background:var(--ok);color:#fff}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.actions>*{flex:1}.msg{border-radius:14px;padding:12px;font-weight:900;margin:10px 0}.err{background:#fff0ed;color:var(--bad);border:1px solid #f1c1b8}.good{background:#eaf7ed;color:var(--ok);border:1px solid #bfe7ca}.hint{background:#fff3df;border:1px solid var(--line);border-radius:14px;padding:10px;color:var(--muted);font-weight:850}.summaryItem{border-bottom:1px dashed var(--line);padding:8px 0}.total{font-size:1.35rem;font-weight:1000;color:var(--acc);margin-top:10px}.split{display:none}.split.show{display:block}@media(max-width:980px){.grid{grid-template-columns:1fr}.products{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:620px){.products{grid-template-columns:1fr}.wrap{width:calc(100% - 18px)}} </style></head><body><main class="wrap"><section class="card"><h1>Catálogo Supabase Pedido</h1><p class="muted">Versión paralela: guarda pedidos directamente en Supabase. No reemplaza aún el catálogo principal.</p><div class="actions"><a class="secondary" href="catalogo-supabase.html">Entrada limpia</a><a class="secondary" href="admin-dashboard-supabase-v3.html">Dashboard Supabase</a></div></section><div class="grid"><section class="card"><h2>Productos</h2><div id="status" class="msg good">Cargando productos...</div><div id="products" class="products"></div></section><aside class="card"><h2>Pedido</h2><div id="summary"></div><div id="ruleHint" class="hint">Selecciona productos.</div><form id="form"><label>Nombre<input id="name" required></label><label>WhatsApp<input id="phone" inputmode="tel" placeholder="+56 9..."></label><label>Fecha entrega/retiro<input id="date" type="date" required></label><label>Método pago<select id="pay"><option>Transferencia bancaria</option><option>Pago al retirar</option></select></label><label class="split" id="splitBox">Pedido mixto<select id="split"><option value="no">Entregar todo junto</option><option value="yes">Separar pan y galletas</option></select></label><label>Observación<textarea id="obs"></textarea></label><button class="primary" type="submit">Guardar pedido en Supabase</button></form><div id="msg" class="msg good" style="display:none"></div></aside></div></main><script>const SUPABASE_URL='https://uhwaybppsyibiwvqyglr.supabase.co';const WA_NUMBER='56930210411';const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s)),money=new Intl.NumberFormat('es-CL',{style:'currency',currency:'CLP',maximumFractionDigits:0});let KEY='',catalog=[];function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}async function loadKey(){if(KEY)return KEY;const html=await fetch('supabase-catalogo-test.html?v='+Date.now()).then(r=>r.text());const m=html.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)['"]/);if(!m)throw Error('No se pudo leer la anon key');KEY=m[1];return KEY}async function api(path,opts={}){const key=await loadKey();const r=await fetch(SUPABASE_URL+path,{...opts,headers:{apikey:key,Authorization:'Bearer '+key,'Content-Type':'application/json',...(opts.headers||{})}});const txt=await r.text();let data=null;try{data=txt?JSON.parse(txt):null}catch(e){data=txt}if(!r.ok)throw Error(typeof data==='string'?data:(data&&data.message)||txt||'Error Supabase');return data}function minDate(days){const d=new Date();d.setDate(d.getDate()+days);return d.toISOString().slice(0,10)}function isPan(p){return String(p.categoria||'').toLowerCase()==='pan'||String(p.nombre||'').toLowerCase().includes('pan')}function isGalleta(p){return String(p.categoria||'').toLowerCase()==='galleta'||String(p.nombre||'').toLowerCase().includes('galleta')}function selected(){return $$('.product.selected').map(card=>{const p=catalog.find(x=>x.codigo===card.dataset.code);const q=Math.max(1,parseInt(card.querySelector('.qty').value||'1',10)||1);return {id:p.codigo,codigo:p.codigo,nombre:p.nombre,categoria:p.categoria,precio:Number(p.precio)||0,cantidad:q,subtotal:(Number(p.precio)||0)*q}})}function rules(items){const pan=items.some(isPan),gal=items.some(isGalleta);return{minDays:pan?3:1,isMixed:pan&&gal,tipoPedido:pan&&gal?'Mixto':pan?'Pan':gal?'Galletas':'Otro',notaEntrega:pan&&gal?'Pedido mixto':pan?'Pedido de pan':gal?'Pedido de galletas':'Pedido'}}function renderProducts(){const box=$('#products');box.innerHTML=catalog.map(p=>`<article class="product" data-code="${esc(p.codigo)}"><h3>${esc(p.nombre)}</h3><div class="small">${esc(p.descripcion||'')}</div><div class="price">${money.format(p.precio)}</div><div class="small">${esc(p.codigo)}</div><div class="row"><input class="qty" type="number" min="1" value="1"><button class="secondary" type="button">Agregar</button></div></article>`).join('');$$('.product').forEach(card=>{const b=card.querySelector('button'),q=card.querySelector('.qty');b.onclick=()=>{card.classList.toggle('selected');b.textContent=card.classList.contains('selected')?'Quitar':'Agregar';b.className=card.classList.contains('selected')?'green':'secondary';renderSummary()};q.oninput=renderSummary});renderSummary()}function renderSummary(){const items=selected(),r=rules(items),total=items.reduce((s,p)=>s+p.subtotal,0);$('#date').min=minDate(r.minDays);$('#splitBox').classList.toggle('show',r.isMixed);$('#ruleHint').textContent=items.length?`${r.notaEntrega}: mínimo ${r.minDays} día(s) de anticipación.`:'Selecciona productos.';$('#summary').innerHTML=items.length?items.map(p=>`<div class="summaryItem"><strong>${esc(p.nombre)} x ${p.cantidad}</strong><div>${money.format(p.subtotal)}</div></div>`).join('')+`<div class="total">Total ${money.format(total)}</div>`:'<p class="muted">Sin productos.</p>'}function buildPayload(){const items=selected(),r=rules(items);return{nombreCliente:$('#name').value.trim(),telefonoCliente:$('#phone').value.trim(),fechaSolicitada:$('#date').value,metodoPago:$('#pay').value,requiereDatosTransferencia:$('#pay').value==='Transferencia bancaria',entregaSeparada:r.isMixed&&$('#split').value==='yes',notaEntrega:r.notaEntrega,tipoPedido:r.tipoPedido,observacion:$('#obs').value.trim(),productosSeleccionados:items,totalEstimado:items.reduce((s,p)=>s+p.subtotal,0),origen:'Catálogo Supabase directo',canal:'web-supabase-directo'}}function whatsappUrl(result,payload){const msg=['Hola! Quiero confirmar mi pedido '+(result.folio||''),'Nombre: '+payload.nombreCliente,'Fecha: '+payload.fechaSolicitada,'Total: '+money.format(payload.totalEstimado),'Tipo: '+payload.tipoPedido].join('\n');return 'https://api.whatsapp.com/send/?phone='+WA_NUMBER+'&text='+encodeURIComponent(msg)+'&type=phone_number&app_absent=0'}async function init(){try{catalog=await api('/rest/v1/productos?select=codigo,nombre,categoria,precio,descripcion,orden,activo&activo=eq.true&order=orden.asc');$('#status').textContent='OK: '+catalog.length+' productos cargados.';renderProducts()}catch(e){$('#status').className='msg err';$('#status').textContent='Error productos: '+e.message}}$('#form').onsubmit=async e=>{e.preventDefault();const payload=buildPayload(),msg=$('#msg');msg.style.display='block';if(!payload.productosSeleccionados.length){msg.className='msg err';msg.textContent='Selecciona productos.';return}if(!payload.nombreCliente||!payload.fechaSolicitada){msg.className='msg err';msg.textContent='Completa nombre y fecha.';return}if(payload.fechaSolicitada<minDate(rules(payload.productosSeleccionados).minDays)){msg.className='msg err';msg.textContent='Fecha no cumple anticipación mínima.';return}try{msg.className='msg good';msg.textContent='Guardando en Supabase...';const result=await api('/rest/v1/rpc/registrar_pedido_publico',{method:'POST',body:JSON.stringify({payload})});msg.innerHTML='Pedido guardado en Supabase.<br><strong>Folio: '+esc(result.folio)+'</strong><div class="actions"><a class="green" target="_blank" href="'+esc(whatsappUrl(result,payload))+'">Enviar WhatsApp</a><a class="secondary" href="admin-dashboard-supabase-v3.html">Ver dashboard</a></div>'}catch(err){msg.className='msg err';msg.textContent='Error guardando pedido: '+(err.message||err)}};init();</script></body></html>
